name: Deploy audio samples to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'mods/rendered/**.mp3'
      - 'mods/remastered/**.mp3'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Stage MP3s under mods/{rendered,remastered}/
        run: |
          mkdir -p _site/mods/rendered _site/mods/remastered
          cp mods/rendered/*.mp3 _site/mods/rendered/
          cp mods/remastered/*.mp3 _site/mods/remastered/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
